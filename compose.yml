services:
  app:
    build:
      context: .
      dockerfile: Containerfile
    volumes:
      - ./ui:/app/ui
      - lora-data:/data
    environment:
      - HOME=/root
      - TERM=xterm
    # SPLAT! coverage predictions are memory-intensive (terrain tiles + PPM rendering).
    # 12 GB accommodates up to 3 concurrent 100 km radius simulations.
    # Reduce to 4 GB if running only small-radius (<10 km) predictions.
    mem_limit: 12G
    ports:
      - 8080:8080
    working_dir: "/app"
    command: ["uvicorn", "app.main:app", "--host", "0.0.0.0", "--port", "8080"]
    restart: unless-stopped

volumes:
  lora-data:
